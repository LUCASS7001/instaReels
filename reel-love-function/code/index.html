    <script>
      /* ═══════════════════════════════════════════════════════
           ✏️ EASY CONFIG — Edit these to customize your reel!
           ═══════════════════════════════════════════════════════ */

      var PASSWORDS = ["love", "you"]; // Accepted passwords (case-insensitive)

      var LOVE_LINE_1 = "You are the only password";
      var LOVE_LINE_2 = "to my heart 💕";

      var LOVE_QUOTE_1 = "I loved you yesterday,";
      var LOVE_QUOTE_2 = "I love you still,";
      var LOVE_QUOTE_3 = "I always have,";
      var LOVE_QUOTE_4 = "and I always will.";

      var LOVE_SIGNATURE = "— forever yours 🤍";

      var WRONG_MSG = "❌ WRONG PASSWORD";
      var DENIED_MSG = "❤️ ACCESS DENIED";
      var GRANTED_MSG = "✅ ACCESS GRANTED";

      /* ═══════════════════════════════════════════════════════ */

      var screen = document.getElementById("screen");
      var lockIcon = document.getElementById("lockIcon");
      var status = document.getElementById("status");
      var message = document.getElementById("message");
      var input = document.getElementById("passInput");
      var flash = document.getElementById("flash");
      var scanLine = document.getElementById("scanLine");
      var btn = document.getElementById("unlockBtn");
      var isLocked = true;

      btn.addEventListener("click", function () {
        if (!isLocked) return;

        var typed = input.value.trim().toLowerCase();

        if (!typed) {
          triggerWrong();
          return;
        }

        if (PASSWORDS.indexOf(typed) === -1) {
          triggerWrong();
          return;
        }

        isLocked = false;
        btn.disabled = true;
        startScan();
      });

      input.addEventListener("keydown", function (e) {
        if (e.key === "Enter") btn.click();
      });

      function triggerWrong() {
        screen.classList.remove("wrong");
        void screen.offsetWidth;
        screen.classList.add("wrong");
        status.textContent = WRONG_MSG;
        input.value = "";
        input.focus();

        setTimeout(function () {
          screen.classList.remove("wrong");
          status.textContent = DENIED_MSG;
        }, 1200);
      }

      function startScan() {
        document.body.classList.add("scanning");
        scanLine.classList.add("active");
        btn.textContent = "SCANNING...";

        setTimeout(function () {
          btn.textContent = "DECRYPTING...";
        }, 900);

        setTimeout(function () {
          btn.textContent = "VERIFYING...";
        }, 1700);

        setTimeout(function () {
          flash.style.opacity = "0.6";
          setTimeout(function () {
            flash.style.opacity = "0";
          }, 200);

          document.body.classList.remove("scanning");
          scanLine.classList.remove("active");
          screen.classList.add("granted");
          document.body.classList.add("unlocked");

          lockIcon.textContent = "❤️";
          status.textContent = GRANTED_MSG;

          message.innerHTML =
            '<span class="love-line">' +
            LOVE_LINE_1 +
            "</span>" +
            '<span class="love-line">' +
            LOVE_LINE_2 +
            "</span>" +
            '<span class="love-sep">── ♡ ──</span>' +
            '<span class="love-quote">' +
            LOVE_QUOTE_1 +
            "</span>" +
            '<span class="love-quote">' +
            LOVE_QUOTE_2 +
            "</span>" +
            '<span class="love-quote">' +
            LOVE_QUOTE_3 +
            "</span>" +
            '<span class="love-quote">' +
            LOVE_QUOTE_4 +
            "</span>" +
            '<span class="love-sig">' +
            LOVE_SIGNATURE +
            "</span>";

          btn.textContent = "UNLOCKED ❤️";

          for (var i = 0; i < 40; i++) {
            setTimeout(createHeart, i * 80);
          }
          for (var j = 0; j < 25; j++) {
            setTimeout(createSparkle, j * 130);
          }

          setTimeout(function () {
            setInterval(createFallingHeart, 350);
          }, 2000);
        }, 2500);
      }

      function createHeart() {
        var pool = ["❤️", "💕", "💗", "💖", "🩷", "💝"];
        var h = document.createElement("span");
        h.textContent = pool[Math.floor(Math.random() * pool.length)];
        var size = Math.random() * 22 + 14;
        var drift = Math.random() * 120 - 60;
        var spin = Math.random() * 1080 - 540;
        var dur = Math.random() * 2 + 2.5;
        h.style.cssText =
          "position:fixed;bottom:-40px;font-size:" +
          size +
          "px;" +
          "left:" +
          Math.random() * 100 +
          "%;z-index:201;pointer-events:none;" +
          "animation:floatHeart " +
          dur +
          "s cubic-bezier(0.2,0.8,0.3,1) forwards;" +
          "--drift:" +
          drift +
          "px;--spin:" +
          spin +
          "deg;";
        document.getElementById("heartsContainer").appendChild(h);
        setTimeout(function () {
          h.remove();
        }, 5000);
      }

      function createSparkle() {
        var s = document.createElement("span");
        s.textContent = "✨";
        var dur = Math.random() * 3 + 2;
        s.style.cssText =
          "position:fixed;bottom:-20px;font-size:" +
          (Math.random() * 14 + 10) +
          "px;" +
          "left:" +
          Math.random() * 100 +
          "%;z-index:201;pointer-events:none;" +
          "animation:sparkle " +
          dur +
          "s ease-out forwards;";
        document.getElementById("heartsContainer").appendChild(s);
        setTimeout(function () {
          s.remove();
        }, 5500);
      }

      function createFallingHeart() {
        var pool = ["❤️", "💗", "🩷", "💕", "🤍", "✨"];
        var h = document.createElement("span");
        h.textContent = pool[Math.floor(Math.random() * pool.length)];
        var size = Math.random() * 0.6 + 0.4;
        var opacity = Math.random() * 0.4 + 0.15;
        var sway = Math.random() * 60 - 30;
        var dur = Math.random() * 5 + 5;
        h.style.cssText =
          "position:fixed;top:-30px;font-size:" +
          (Math.random() * 16 + 12) +
          "px;" +
          "left:" +
          Math.random() * 100 +
          "%;z-index:1;pointer-events:none;" +
          "animation:heartRain " +
          dur +
          "s linear forwards;" +
          "--s:" +
          size +
          ";--o:" +
          opacity +
          ";--sway:" +
          sway +
          "px;";
        document.getElementById("heartsContainer").appendChild(h);
        setTimeout(
          function () {
            h.remove();
          },
          (dur + 1) * 1000,
        );
      }
    </script>
  </body>
</html>
