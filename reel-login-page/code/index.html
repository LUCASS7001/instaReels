<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Real Coding Evolving Login Reel</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="bg-layer">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="grid"></div>
      <div class="badge"><i></i> Secure System</div>
    </div>
    <div class="card">
      <div class="logo">
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <rect x="3" y="11" width="18" height="11" rx="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
      </div>

      <h2>Welcome Back</h2>
      <p>Sign in to your account</p>

      <div class="field">
        <label>Email</label>
        <input type="email" placeholder="you@example.com" />
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" placeholder="••••••••" />
      </div>

      <div class="options">
        <label
          style="
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0;
            flex-direction: row;
          "
        >
          <input type="checkbox" style="width: auto; margin: 0" /> Remember me
        </label>
        <a href="#">Forgot password?</a>
      </div>

      <button class="btn-submit">Sign In →</button>

      <div class="divider"><span>or continue with</span></div>

      <div class="socials">
        <button>Google</button>
        <button>GitHub</button>
      </div>

      <div class="footer">New here? <a href="#">Create an account</a></div>
    </div>
    <style>
      body {
        background-color: #0b0b10;
        color: #fff;
        font-family: "Inter", sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .bg-layer {
        opacity: 0;
        position: absolute;
        inset: 0;
        z-index: -1;
        pointer-events: none;
      }

      .card {
        background-color: #12121a;
        width: 380px;
        padding: 40px;
        border-radius: 16px;
        box-sizing: border-box;
        border: 1px solid #222;
      }

      .logo {
        width: 48px;
        height: 48px;
        margin: 0 auto 20px;
        border-radius: 12px;
        background: #1a1a24;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #7c3aed;
      }

      h2 {
        text-align: center;
        margin: 0 0 8px;
        font-size: 24px;
      }

      p {
        text-align: center;
        color: #888;
        margin: 0 0 32px;
        font-size: 14px;
      }

      .field {
        margin-bottom: 20px;
      }

      label {
        display: block;
        color: #aaa;
        font-size: 13px;
        margin-bottom: 8px;
      }

      input[type="email"],
      input[type="password"] {
        width: 100%;
        padding: 12px 14px;
        box-sizing: border-box;
        background: #1a1a24;
        border: 1px solid #333;
        border-radius: 10px;
        color: #fff;
        font-family: "Inter", sans-serif;
        font-size: 14px;
      }

      .options {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 13px;
        margin-bottom: 24px;
      }

      .options a,
      .footer a {
        color: #38bdf8;
        text-decoration: none;
      }

      .btn-submit {
        width: 100%;
        padding: 14px;
        background: #444;
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 600;
      }

      .divider {
        display: flex;
        align-items: center;
        gap: 16px;
        margin: 32px 0;
        font-size: 13px;
        color: #666;
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: #2a2a35;
      }

      .socials {
        display: flex;
        gap: 12px;
      }

      .socials button {
        flex: 1;
        padding: 12px;
        background: transparent;
        border: 1px solid #333;
        border-radius: 10px;
        color: #fff;
      }

      .footer {
        text-align: center;
        margin-top: 32px;
        font-size: 14px;
        color: #888;
      }

      .card {
        background: rgba(18, 18, 26, 0.6);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.06);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
      }

      .logo {
        background:
          linear-gradient(#12121a, #12121a) padding-box,
          linear-gradient(135deg, #8b5cf6, #0ea5e9) border-box;
        border: 2px solid transparent;
        color: #8b5cf6;
      }

      h2 {
        background: linear-gradient(135deg, #fff, #8b5cf6, #0ea5e9);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-weight: 800;
        letter-spacing: -0.5px;
      }

      .btn-submit {
        background: linear-gradient(135deg, #8b5cf6, #0ea5e9);
      }

      input[type="email"],
      input[type="password"],
      .btn-submit,
      .socials button,
      .options a {
        transition: all 0.3s ease;
      }

      input:focus {
        outline: none;
        border-color: #8b5cf6;
        background: rgba(139, 92, 246, 0.05);
        box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15);
      }

      .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(139, 92, 246, 0.4);
        cursor: pointer;
      }

      .socials button:hover {
        background: rgba(255, 255, 255, 0.05);
        border-color: rgba(255, 255, 255, 0.15);
        cursor: pointer;
      }

      .options a:hover,
      .footer a:hover {
        color: #8b5cf6;
      }

      .bg-layer {
        opacity: 1;
        transition: opacity 1.5s ease-in;
      }

      .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(90px);
        animation: drift 12s infinite alternate ease-in-out;
      }

      .orb-1 {
        width: 450px;
        height: 450px;
        background: rgba(139, 92, 246, 0.25);
        top: -10%;
        left: -10%;
      }

      .orb-2 {
        width: 350px;
        height: 350px;
        background: rgba(14, 165, 233, 0.2);
        bottom: -10%;
        right: -5%;
        animation-delay: -5s;
      }

      .grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
        background-size: 50px 50px;
        mask-image: radial-gradient(
          circle at center,
          black 40%,
          transparent 80%
        );
        -webkit-mask-image: radial-gradient(
          circle at center,
          black 40%,
          transparent 80%
        );
      }

      .badge {
        position: absolute;
        top: 32px;
        left: 50%;
        transform: translateX(-50%);
        padding: 6px 16px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        color: rgba(255, 255, 255, 0.6);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 1px;
        display: flex;
        align-items: center;
        gap: 8px;
        text-transform: uppercase;
      }

      .badge i {
        width: 6px;
        height: 6px;
        background: #10b981;
        border-radius: 50%;
        box-shadow: 0 0 10px #10b981;
        animation: pulse 2s infinite;
      }

      @keyframes drift {
        from {
          transform: translate(0, 0);
        }

        to {
          transform: translate(40px, 30px);
        }
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }

        50% {
          opacity: 0.4;
        }
      }
    </style>

    <script>
      const btn = document.querySelector(".btn-submit");
      const card = document.querySelector(".card");

      btn.addEventListener("click", () => {
        const originalText = btn.innerHTML;
        btn.innerHTML = "Connecting...";
        btn.style.opacity = "0.7";

        setTimeout(() => {
          btn.innerHTML = "✓ Success";
          btn.style.background = "linear-gradient(135deg, #059669, #10b981)";
          btn.style.opacity = "1";

          card.style.borderColor = "rgba(16, 185, 129, 0.4)";
          card.style.boxShadow =
            "0 0 60px rgba(16, 185, 129, 0.15), 0 24px 80px rgba(0, 0, 0, 0.5)";

          setTimeout(() => {
            btn.innerHTML = originalText;
            btn.style.background = "";
            card.style.borderColor = "";
            card.style.boxShadow = "";
          }, 2500);
        }, 1500);
      });
    </script>
  </body>
</html>
